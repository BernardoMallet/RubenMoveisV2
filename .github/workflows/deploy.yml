name: Deploy Ruben Móveis - Vite + React

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: |
        echo "Installing dependencies with npm ci..."
        npm ci --verbose
        echo "✓ Dependencies installed successfully"
      timeout-minutes: 10
      continue-on-error: true
    
    - name: Fallback - Install with npm install (if ci failed)
      if: failure()
      run: |
        echo "npm ci failed, falling back to npm install..."
        npm install
        echo "✓ Dependencies installed with npm install"
      timeout-minutes: 10

    - name: Verify Node.js and npm versions
      run: |
        echo "Node version: $(node --version)"
        echo "npm version: $(npm --version)"
        echo "npm cache: $(npm cache verify)"

    - name: Build project (Vite)
      run: npm run build
      timeout-minutes: 15
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.example.com' }}

    - name: Verify build output
      run: |
        echo "Verifying build output..."
        if [ ! -d "dist" ]; then
          echo "ERROR: Build failed - dist directory not found"
          echo "Current directory contents:"
          ls -lah
          exit 1
        fi
        echo "✓ Build successful"
        echo "Dist directory contents:"
        ls -lah dist/
        echo "Total size:"
        du -sh dist/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 1

  deploy:
    name: Deploy to Locaweb (FTP)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: build-artifacts
        path: dist/

    - name: List files to deploy
      run: ls -lah dist/

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_HOST }}
        username: ${{ secrets.FTP_USER }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: ./
        dangerous-clean-slate: true
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/images_OLD/**
        protocol: ftp
        state-name: .ftp-deploy-sync-state.json

    - name: Deployment Status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✓ Deployment completed successfully!"
          echo "URL: https://rubenmoveis.com.br"
        else
          echo "✗ Deployment failed"
          exit 1
        fi

  post-deploy:
    name: Post Deploy Validation
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
    - name: Check website health
      run: |
        RETRIES=5
        RETRY_DELAY=10
        
        for i in $(seq 1 $RETRIES); do
          echo "Attempt $i of $RETRIES..."
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://rubenmoveis.com.br/)
          
          if [ "$HTTP_CODE" == "200" ]; then
            echo "✓ Website is online (HTTP $HTTP_CODE)"
            exit 0
          else
            echo "✗ Website returned HTTP $HTTP_CODE"
            if [ $i -lt $RETRIES ]; then
              sleep $RETRY_DELAY
            fi
          fi
        done
        
        echo "✗ Website health check failed after $RETRIES attempts"
        exit 1

    - name: Notify success
      run: echo "🎉 Deploy successful! Visit https://rubenmoveis.com.br"

  failure-notification:
    name: Notify on Failure
    runs-on: ubuntu-latest
    if: failure()
    
    steps:
    - name: Send failure notification
      run: echo "⚠️ Deploy pipeline failed. Check logs above."
