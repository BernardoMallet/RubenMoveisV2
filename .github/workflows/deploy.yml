name: Deploy Ruben Móveis - Vite + React

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  NODE_VERSION: "22"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        timeout-minutes: 10

      - name: Build project (Vite)
        run: npm run build
        timeout-minutes: 15
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL || 'https://api.example.com' }}

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "ERROR: Build failed - dist directory not found"
            exit 1
          fi
          echo "✓ Build successful"
          ls -lah dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Locaweb (FTP)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Check FTP Credentials
        run: |
          if [ -z "${{ secrets.FTP_HOST }}" ] || [ -z "${{ secrets.FTP_USER }}" ] || [ -z "${{ secrets.FTP_PASSWORD }}" ]; then
            echo "❌ ERROR: FTP credentials not configured!"
            echo ""
            echo "Please add the following secrets to your GitHub repository:"
            echo "1. FTP_HOST - Your FTP server hostname/IP"
            echo "2. FTP_USER - Your FTP username"
            echo "3. FTP_PASSWORD - Your FTP password"
            echo ""
            echo "Go to: Settings > Secrets and Variables > Actions"
            exit 1
          fi
          echo "✓ FTP credentials are configured"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: dist/

      - name: Deploy via FTP
        uses: locaweb/ftp-deploy@1.0.0
        with:
          host: ${{ secrets.FTP_HOST }}
          user: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          localDir: ./dist/
          remoteDir: public_html/
          forceSsl: false

  post-deploy:
    name: Post Deploy Validation
    runs-on: ubuntu-latest
    needs: deploy
    if: always() && needs.deploy.result == 'success'

    steps:
      - name: Check website health
        run: |
          RETRIES=5
          RETRY_DELAY=10
          
          for i in $(seq 1 $RETRIES); do
            echo "Attempt $i of $RETRIES..."
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://rubenmoveis.com.br/)
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Website is online (HTTP $HTTP_CODE)"
              exit 0
            else
              echo "✗ Website returned HTTP $HTTP_CODE"
              if [ $i -lt $RETRIES ]; then
                sleep $RETRY_DELAY
              fi
            fi
          done
          
          echo "Deploy validation complete. Website check timed out but deployment may be successful."
          exit 0
